<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX ELITE — Protocol</title>
  
  <!-- App Icons and PWA Meta Tags -->
  <link rel="icon" href="https://raw.githubusercontent.com/FatHexy/apex/refs/heads/main/APEX_logo_design_202603250139.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/FatHexy/apex/refs/heads/main/APEX_logo_design_202603250139.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="APEX ELITE">
  <meta name="theme-color" content="#050505">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #050505;
      --bg-surface: #0a0a0a;
      --bg-card: #0d0d0d;
      --border-light: #1a1a1a;
      --border-focus: #2a2a2a;
      --text-main: #e8e8e8;
      --text-muted: #666;
      --text-dark: #444;
      --accent: #FF4500;
      --accent-rgb: 255, 69, 0; 
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-cyber: 'Orbitron', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-body); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; min-height: 100vh; display: flex; justify-content: center; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .app-container { width: 100%; max-width: 600px; background-color: var(--bg-surface); position: relative; box-shadow: 0 0 80px rgba(0, 0, 0, 0.8); border-left: 1px solid var(--border-light); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; overflow: hidden; }

    /* --- Sections --- */
    .sticky-top-bar { position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); }
    .brand { font-family: var(--font-display); font-size: 16px; font-weight: 800; letter-spacing: 0.1em; color: #fff; }
    .live-status { display: flex; align-items: center; gap: 12px; }
    #live-time { font-family: monospace; font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; }
    .today-badge { font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: 0.15em; color: #000; background: var(--accent); padding: 4px 8px; border-radius: 3px; transition: background 0.4s ease; }

    .global-header { padding: 32px 24px 24px; border-bottom: 3px solid var(--accent); background: linear-gradient(180deg, #111 0%, #0a0a0a 100%); position: relative; overflow: hidden; transition: border-color 0.4s ease; }
    .header-glow { position: absolute; top: -50%; right: -35%; width: 500px; height: 500px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); opacity: 0.15; pointer-events: none; transition: background 0.4s ease; }
    .header-content { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
    .pre-title { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.25em; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; }
    .main-title { font-family: var(--font-display); font-size: 38px; font-weight: 900; letter-spacing: 0.04em; line-height: 1; color: #fff; }
    .sub-title { font-size: 13px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
    .level-badge { text-align: right; }
    .level-label { font-family: var(--font-display); font-size: 11px; color: var(--text-dark); letter-spacing: 0.2em; }
    .level-value { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--accent); transition: color 0.4s ease; }

    .day-selector-wrap { background: #0c0c0c; border-bottom: 1px solid var(--border-light); padding: 16px 24px; }
    .day-selector { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 10px 4px; margin: -10px -4px; }
    .day-selector::-webkit-scrollbar { display: none; }
    .day-btn { flex: 1; min-width: 60px; padding: 10px 4px; background: #141414; color: var(--text-muted); border: 1px solid var(--border-light); border-radius: 6px; font-family: var(--font-display); cursor: pointer; text-align: center; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); user-select: none; position: relative; }
    .day-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.3); border-color: var(--border-focus); }
    .day-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.3); transform: translateY(-2px); }
    .day-btn.active:hover:not(:disabled) { filter: brightness(0.9); }
    .day-btn .day-name { font-weight: 800; font-size: 14px; letter-spacing: 0.1em; }
    .day-btn .day-theme { font-size: 9px; font-weight: 700; margin-top: 2px; opacity: 0.8; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px;}
    .day-today-marker { position: absolute; top: -8px; right: -4px; background: var(--accent); color: #000; font-size: 8px; font-weight: 800; padding: 3px 5px; border-radius: 4px; letter-spacing: 0.05em; font-family: var(--font-display); box-shadow: 0 2px 6px rgba(0,0,0,0.8); z-index: 10; }

    .day-content { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .active-day-header { padding: 24px 24px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 12px; }
    .active-day-title { font-family: var(--font-cyber); font-size: 40px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: 0.05em; text-transform: uppercase; text-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent); }
    .active-day-theme { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.06em; line-height: 1.2;}
    .active-day-sub { font-family: var(--font-display); font-size: 13px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px;}
    .today-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.25em; color: var(--text-muted); font-weight: 700;}
    .today-label.is-today { color: var(--accent); transition: color 0.4s ease; }
    .active-day-title-wrap { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }

    .sessions-container { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    .session-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .session-header { padding: 14px 20px; background: #111; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; transition: background 0.2s ease; gap: 12px;}
    .session-header:hover { background: #181818; }
    .session-header.is-open { border-bottom: 1px solid var(--border-light); }
    .session-header:not(.is-open) { border-bottom: none; }
    .session-header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; }
    .session-name { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.08em; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
    
    .session-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .session-badge { font-family: var(--font-display); font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 3px 8px; border-radius: 4px; letter-spacing: 0.1em; font-weight: 700; background: rgba(255,255,255,0.02); display: flex; align-items: center;}
    .session-badge.rest-badge-header { color: #aaa; border-color: #444; }

    .session-toggle-icon { font-size: 14px; color: var(--text-muted); font-family: monospace; transition: transform 0.3s ease; margin-left: auto; }
    .session-header.is-open .session-toggle-icon { transform: rotate(180deg); color: var(--accent); }

    .session-body-wrapper { display: grid; grid-template-rows: 1fr; transition: grid-template-rows 0.3s ease; }
    .session-body-wrapper.closed { grid-template-rows: 0fr; }
    .session-body-inner { overflow: hidden; }

    .blocks-container { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .block { border: 1px solid var(--border-light); border-radius: 6px; background: #0f0f0f; overflow: hidden; transition: border-color 0.2s ease; }
    .block-header { padding: 12px 16px; background: #131313; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background 0.2s ease; }
    .block-header:hover { background: #181818; }
    .block-header.is-open { border-bottom: 1px solid var(--border-light); }
    .block-title { font-family: var(--font-display); font-size: 15px; font-weight: 800; color: #ccc; letter-spacing: 0.12em; line-height: 1.3;}
    .block-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; line-height: 1.4; min-height: 16px; }
    .block-toggle-icon { font-size: 12px; color: #555; font-family: monospace; transition: transform 0.3s ease; margin-left: 12px;}
    .block-header.is-open .block-toggle-icon { transform: rotate(180deg); color: var(--text-main); }

    .block-items-wrapper { display: grid; grid-template-rows: 1fr; transition: grid-template-rows 0.3s ease; }
    .block-items-wrapper.closed { grid-template-rows: 0fr; }
    .block-items-inner { overflow: hidden; }

    .exercise-item { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 16px; border-bottom: 1px solid #161616; transition: background 0.15s ease; }
    .exercise-item:last-child { border-bottom: none; }
    .exercise-item:hover { background: rgba(255,255,255,0.02); }
    .exercise-left { display: flex; align-items: flex-start; gap: 12px; flex: 1; min-width: 0; }
    .exercise-tag { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; padding: 3px 6px; border-radius: 3px; border: 1px solid; flex-shrink: 0; text-transform: uppercase; margin-top: 2px; }
    .exercise-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: #ddd; letter-spacing: 0.02em; white-space: normal; line-height: 1.3; word-break: break-word; }
    
    .exercise-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .metrics-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .metric-box { background: rgba(var(--accent-rgb), 0.05); border: 1px solid rgba(var(--accent-rgb), 0.3); border-radius: 4px; padding: 3px 8px; display: inline-flex; align-items: baseline; gap: 4px; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); }
    .m-val { font-family: var(--font-cyber); font-size: 14px; font-weight: 700; color: var(--accent); }
    .m-lbl { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.1em; text-transform: uppercase; }
    .m-text { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: #ccc; letter-spacing: 0.05em; text-transform: uppercase; }
    .metric-divider { font-size: 14px; color: #555; font-weight: 900; }

    .rest-badge { font-family: monospace; font-size: 11px; font-weight: 700; color: #aaa; background: rgba(255,255,255,0.08); padding: 4px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.1); }
    .rest-badge::before { content: '⏱'; font-size: 10px; }

    .protocol-notes { margin: 0 24px 40px; padding: 24px; background: #0c0c0c; border: 1px solid var(--border-light); border-radius: 8px; position: relative; }
    .protocol-notes::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--text-dark); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
    .notes-title { font-family: var(--font-display); font-size: 14px; color: var(--text-muted); letter-spacing: 0.25em; margin-bottom: 16px; font-weight: 700; }
    .note-item { display: flex; gap: 12px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
    .note-item:last-child { margin-bottom: 0; }
    .note-bullet { color: var(--accent); font-weight: 700; flex-shrink: 0; white-space: nowrap; transition: color 0.4s ease;}
    .note-text { color: #888; flex: 1; min-height: 20px;}
    
    .rest-day-msg { text-align: center; padding: 60px 20px; }
    .rest-day-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5;}
    .rest-day-title { font-family: var(--font-display); font-size: 32px; color: #fff; margin-bottom: 8px; letter-spacing: 0.05em;}
    .rest-day-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 300px; margin: 0 auto; }

    @media (max-width: 480px) {
      .exercise-item { flex-direction: column; align-items: flex-start; gap: 12px; }
      .exercise-right { flex-direction: row; width: 100%; justify-content: space-between; align-items: center; padding-left: 0; margin-top: 4px;}
      .metrics-group { justify-content: flex-start; }
      .active-day-title { font-size: 32px; }
      .sessions-container { padding: 16px; }
      .protocol-notes { margin: 0 16px 40px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="sticky-top-bar">
      <div class="brand">APEX<span id="brand-dot" style="color: var(--accent); transition: color 0.4s ease;">.</span>PROTOCOL</div>
      <div class="live-status">
        <span id="live-time">00:00:00</span>
        <span class="today-badge" id="today-badge">—</span>
      </div>
    </div>

    <header class="global-header" id="globalHeaderArea"></header>
    <nav class="day-selector-wrap"><div class="day-selector" id="daySelector"></div></nav>
    <main id="appContent"></main>
    <section class="protocol-notes" id="notesArea"></section>

  </div>
  <script>
    // --- DATA ---
    const tagColors = {
      PRIMER: { bg: "#1a0a00", text: "#FF8C00", border: "#FF8C00" },
      SKILL: { bg: "#001a0a", text: "#39FF14", border: "#39FF14" },
      STR: { bg: "#0a0015", text: "#BF5FFF", border: "#BF5FFF" },
      KARDIO: { bg: "#001020", text: "#00BFFF", border: "#00BFFF" },
      CORE: { bg: "#1a0010", text: "#FF69B4", border: "#FF69B4" },
      BOKS: { bg: "#1a0500", text: "#FF4500", border: "#FF4500" },
      TKD: { bg: "#001a1a", text: "#00FFD1", border: "#00FFD1" },
      FUSION: { bg: "#1a1000", text: "#FFD700", border: "#FFD700" },
      WARMUP: { bg: "#0d0d0d", text: "#888", border: "#444" },
      MOBIL: { bg: "#0a1a10", text: "#7FFF00", border: "#7FFF00" },
      ISOMETRIK: { bg: "#1a001a", text: "#DA70D6", border: "#DA70D6" },
      POWER: { bg: "#1a0800", text: "#FFA500", border: "#FFA500" },
      KONDISI: { bg: "#150005", text: "#FF6B6B", border: "#FF6B6B" },
      REST: { bg: "#111", text: "#888", border: "#333" } 
    };

    const globalData = {
      preTitle: "ELITE ATHLETE PROGRAM · 22 YRS · INTERMEDIATE",
      mainTitle: "HSPU MASTERY",
      subTitle: "Kalistenik · Boxing · Taekwondo · Cardio",
      level: "INTERMEDIATE+",
      frequency: "6 HARI/MINGGU"
    };

    const notesData = [
      { title: "Morning Primer", text: "Catat total reps setiap hari. Jika angkamu tidak naik 2 minggu berturut-turut, evaluasi recovery-mu." },
      { title: "HSPU Progression", text: "Minggu 1–3: Elevated Pike Push-up. Minggu 4–6: Wall Negative HSPU. Minggu 7+: Full Wall HSPU attempts." },
      { title: "Running Base", text: "Tambah 200–300m setiap minggu. Minggu 1 target 2.5 km, Bulan 2 target 4 km." },
      { title: "Beban Tambahan", text: "Gunakan tas berisi buku/batu untuk squat. Tambah beban 5–10% setiap 2 minggu." },
      { title: "Recovery", text: "Tidur 7–8 jam. Ini bagian dari program, bukan opsional. Istirahat total di hari Minggu." }
    ];

    fetch('./daysData.json')
  .then(res => res.json())
  .then(data => {
    const daysData = data);
  });

    let todayObj = new Date().getDay();
    let currentDayIndex = todayObj === 0 ? 6 : todayObj - 1; 
    const realTodayIndex = currentDayIndex;

    const rootStyle = document.documentElement.style;

    function init() {
      updateTime();
      setInterval(updateTime, 1000);
      document.getElementById('today-badge').textContent = new Date().toLocaleDateString('id-ID',{weekday:'long'}).toUpperCase();
      
      renderGlobalHeader();
      renderNotes();
      renderNav();
      setDay(currentDayIndex);
      setupGlobalListeners();
    }

    function updateTime() {
      const n = new Date();
      const h = String(n.getHours()).padStart(2, '0');
      const m = String(n.getMinutes()).padStart(2, '0');
      const s = String(n.getSeconds()).padStart(2, '0');
      document.getElementById('live-time').textContent = h + ':' + m + ':' + s;
    }

    function renderGlobalHeader() {
      document.getElementById('globalHeaderArea').innerHTML = `
        <div class="header-glow" id="headerGlow"></div>
        <div class="header-content">
          <div>
            <div class="pre-title">${globalData.preTitle}</div>
            <div class="main-title">${globalData.mainTitle}</div>
            <div class="sub-title">${globalData.subTitle}</div>
          </div>
          <div class="level-badge">
            <div class="level-label">LEVEL</div>
            <div class="level-value" id="headerLevelVal">${globalData.level}</div>
            <div class="level-label" style="margin-top: 4px;">${globalData.frequency}</div>
          </div>
        </div>
      `;
    }

    function renderNotes() {
      const notesHtml = notesData.map((note) => `
        <div class="note-item">
          <div class="note-bullet dynamic-color">— <span>${note.title}</span>:</div>
          <div class="note-text">${note.text}</div>
        </div>
      `).join('');
      document.getElementById('notesArea').innerHTML = `<div class="notes-title">PROTOCOL NOTES</div>${notesHtml}`;
    }

    function renderNav() {
      document.getElementById('daySelector').innerHTML = daysData.map((d, i) => {
        const isToday = (i === realTodayIndex);
        return `
        <button class="day-btn" data-idx="${i}">
          <div class="day-name">${d.day}</div>
          <div class="day-theme">${d.isRest ? 'REST' : d.theme.split(' ')[0]}</div>
          ${isToday ? '<div class="day-today-marker">HARI INI</div>' : ''}
        </button>
        `;
      }).join('');
    }

    function hexToRgb(hex) {
      let r = 0, g = 0, b = 0;
      if (hex.length === 7) {
        r = parseInt(hex.substring(1, 3), 16);
        g = parseInt(hex.substring(3, 5), 16);
        b = parseInt(hex.substring(5, 7), 16);
      }
      return `${r}, ${g}, ${b}`;
    }

    function setDay(index) {
      currentDayIndex = index;
      const d = daysData[index];

      rootStyle.setProperty('--accent', d.color);
      rootStyle.setProperty('--accent-rgb', hexToRgb(d.color));
      
      const levelVal = document.getElementById('headerLevelVal');
      if(levelVal) levelVal.style.color = d.color;
      document.getElementById('brand-dot').style.color = d.color;
      document.querySelectorAll('.dynamic-color').forEach(el => el.style.color = d.color);

      document.querySelectorAll('.day-btn').forEach((btn, i) => {
        if (i === index) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      const appContent = document.getElementById('appContent');
      if (d.isRest) {
        appContent.innerHTML = `
          <div class="day-content rest-day-msg">
            <div class="rest-day-icon">💤</div>
            <div class="rest-day-title">REST DAY</div>
            <div class="rest-day-desc">${d.desc || "Otot tumbuh saat istirahat, bukan saat latihan."}</div>
          </div>
        `;
      } else {
        const isToday = (index === realTodayIndex);
        appContent.innerHTML = `
          <div class="day-content">
            <div class="active-day-header">
              <div class="today-label ${isToday ? 'is-today' : ''}">${isToday ? '🔴 HARI INI — LATIHAN KAMU SEKARANG' : '📅 JADWAL PADA HARI'}</div>
              <div class="active-day-title-wrap">
                <div class="active-day-title">${d.full}</div>
                <div>
                  <div class="active-day-theme">${d.theme}</div>
                  <div class="active-day-sub">${d.sub}</div>
                </div>
              </div>
            </div>
            <div class="sessions-container">
              ${d.sessions.map((session) => renderSession(session)).join('')}
            </div>
          </div>
        `;
      }
    }

    function calculateSessionRest(session) {
      let totalRestSeconds = 0;
      if (!session.blocks) return "0 MIN";
      session.blocks.forEach(block => {
        if (!block.items) return;
        block.items.forEach(item => {
          let restStr = item.rest || "";
          let restSeconds = parseInt(restStr.replace(/[^\d]/g, ''));
          if (!isNaN(restSeconds) && restSeconds > 0) {
            totalRestSeconds += restSeconds; 
          }
        });
      });
      return Math.round(totalRestSeconds / 60) + " MIN";
    }

    function calculateSessionWork(session) {
      let totalWorkSeconds = 0;
      if (!session.blocks) return "0 MIN";
      
      session.blocks.forEach(block => {
        if (!block.items) return;
        block.items.forEach(item => {
          if (item.tag && item.tag.toUpperCase() === 'PRIMER') return;

          let detailStr = item.detail || "";
          let str = detailStr.toUpperCase();
          
          let sets = 1;
          let parts = str.split(/[×X]/);
          if (parts.length > 1) {
             let setStr = parts[0].replace(/[^\d]/g, '');
             if (setStr) sets = parseInt(setStr);
          } else {
             let setMatch = str.match(/(\d+)\s*(SET|ROUND)/);
             if (setMatch) sets = parseInt(setMatch[1]);
          }

          let workSeconds = 0;
          if (str.includes('DETIK') || str.includes('DET')) {
            let m = str.match(/(\d+)\s*(DETIK|DET)/);
            if (m) workSeconds = parseInt(m[1]);
          } else if (str.includes('MENIT') || str.includes('MIN')) {
            let m = str.match(/(\d+)\s*(MENIT|MIN)/);
            if (m) workSeconds = parseInt(m[1]) * 60;
          } else if (str.includes('REPS') || str.includes('REP')) {
            let m = str.match(/(\d+)\s*(REPS?)/);
            if (m) workSeconds = parseInt(m[1]) * 3; 
          } else {
             if (parts.length > 1) {
                 let val = parseInt(parts[1].replace(/[^\d]/g, ''));
                 if (!isNaN(val)) workSeconds = val * 3;
             }
          }

          if (str.includes('KM')) {
             let m = str.match(/([\d\.]+)\s*KM/);
             if (m) workSeconds = parseFloat(m[1]) * 6 * 60; 
          }

          if (str.includes('MAX') && workSeconds === 0) {
             workSeconds = 60;
          }

          totalWorkSeconds += (sets * workSeconds);
        });
      });
      
      return Math.round(totalWorkSeconds / 60) + " MIN";
    }

    function formatMetrics(detail) {
      const parsePart = (str) => {
         const m = str.trim().match(/^([\d\.]+|MAX)\s+(.+)$/i);
         if(m) return `<div class="metric-box"><span class="m-val">${m[1]}</span><span class="m-lbl">${m[2]}</span></div>`;
         return `<div class="metric-box"><span class="m-text">${str.trim()}</span></div>`;
      };
      if(!detail.includes('×')) return `<div class="metrics-group">${parsePart(detail)}</div>`;
      const parts = detail.split('×');
      return `<div class="metrics-group">${parsePart(parts[0])}<span class="metric-divider">×</span>${parsePart(parts[1])}</div>`;
    }

    function renderSession(session) {
      const calculatedRest = calculateSessionRest(session);
      const calculatedWork = calculateSessionWork(session);
      
      return `
        <div class="session-card">
          <div class="session-header is-open">
            <div class="session-header-left">
              <div class="session-name">
                <span>${session.time}</span>
                <span>—</span>
                <span>${session.label}</span>
              </div>
              <div class="session-badges">
                <div class="session-badge">⚡ WORK ${calculatedWork || '60 MENIT'}</div>
                <div class="session-badge rest-badge-header">⏱ REST ${calculatedRest}</div>
              </div>
            </div>
            <div class="session-toggle-icon">▼</div>
          </div>
          <div class="session-body-wrapper">
            <div class="session-body-inner blocks-container">
              ${session.blocks.map((block) => renderBlock(block)).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderBlock(block) {
      const itemsHtml = block.items.map((item) => {
        const tc = tagColors[item.tag] || tagColors.WARMUP;
        const restHtml = item.rest && item.rest !== "None" ? `<div class="rest-badge"><span>${item.rest}</span></div>` : '';
        return `
          <div class="exercise-item">
            <div class="exercise-left">
              <span class="exercise-tag" style="color: ${tc.text}; background: ${tc.bg}; border-color: ${tc.border};">${item.tag}</span>
              <span class="exercise-name">${item.move}</span>
            </div>
            <div class="exercise-right">
              <div>${formatMetrics(item.detail)}</div>
              ${restHtml}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="block">
          <div class="block-header is-open">
            <div style="flex:1;">
              <div class="block-title">${block.title}</div>
              <div class="block-note">${block.note || ''}</div>
            </div>
            <div class="block-toggle-icon">▼</div>
          </div>
          <div class="block-items-wrapper"><div class="block-items-inner">${itemsHtml}</div></div>
        </div>
      `;
    }

    function setupGlobalListeners() {
      document.addEventListener('click', (e) => {
        const dayBtn = e.target.closest('.day-btn');
        if (dayBtn) {
          const idx = parseInt(dayBtn.getAttribute('data-idx'));
          if (!isNaN(idx) && idx !== currentDayIndex) setDay(idx);
        }
        
        const blockHeader = e.target.closest('.block-header');
        if (blockHeader) {
          const wrapper = blockHeader.nextElementSibling;
          const isOpen = blockHeader.classList.contains('is-open');
          if (isOpen) { blockHeader.classList.remove('is-open'); wrapper.classList.add('closed'); } 
          else { blockHeader.classList.add('is-open'); wrapper.classList.remove('closed'); }
        }
        
        const sessionHeader = e.target.closest('.session-header');
        if (sessionHeader) {
          const wrapper = sessionHeader.nextElementSibling;
          const isOpen = sessionHeader.classList.contains('is-open');
          if (isOpen) { sessionHeader.classList.remove('is-open'); wrapper.classList.add('closed'); } 
          else { sessionHeader.classList.add('is-open'); wrapper.classList.remove('closed'); }
        }
      });
    }

    init();
  </script>
</body>
</html>
